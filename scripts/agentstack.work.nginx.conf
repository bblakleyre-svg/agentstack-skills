server {
    listen 80;
    listen [::]:80;
    server_name agentstack.work www.agentstack.work skillstack.work www.skillstack.work;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://agentstack.work$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.agentstack.work;

    ssl_certificate     /etc/letsencrypt/live/agentstack.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentstack.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://agentstack.work$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name agentstack.work;

    ssl_certificate     /etc/letsencrypt/live/agentstack.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentstack.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = /install/re {
        alias /var/www/agentstack/install/re.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location = /install/ecom {
        alias /var/www/agentstack/install/ecom.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location = /install/ps {
        alias /var/www/agentstack/install/ps.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location = /install/cc {
        alias /var/www/agentstack/install/cc.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location = /install/health {
        alias /var/www/agentstack/install/health.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location = /install/elderly {
        alias /var/www/agentstack/install/elderly.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location = /install/resto {
        alias /var/www/agentstack/install/resto.sh;
        default_type text/plain;
        access_log /var/log/nginx/agentstack-installs.log;
    }

    location /install/ {
        return 404;
    }

    root /var/www/agentstack/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    access_log /var/log/nginx/agentstack-access.log;
    error_log  /var/log/nginx/agentstack-error.log;
}
